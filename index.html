<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Mapa de Buracos - São Carlos-SP</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <style>
    #map { height: 600px; width: 100%; }
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
    h1 { text-align: center; margin: 10px; }
  </style>
</head>
<body>
  <h1>Monitoramento de Buracos - São Carlos-SP</h1>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script>
    // Configurações do canal ThingSpeak
    const channelID = 3366928;
    const readAPIKey = "LEF1WPETU726HFUY";

    // Inicializar mapa centrado em São Carlos-SP
    const map = L.map('map').setView([-22.0056, -47.8977], 13);

    // Camada base
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    // Buscar dados do ThingSpeak (latitude = Field2, longitude = Field3, categoria = Field4)
    fetch(`https://api.thingspeak.com/channels/${channelID}/feeds.json?api_key=${readAPIKey}&results=8000`)
      .then(response => response.json())
      .then(data => {
        data.feeds.forEach(feed => {
          const lat = Number((feed.field2 || "").trim());
          const lon = Number((feed.field3 || "").trim());
          const categoria = feed.field4;

          if (!isNaN(lat) && !isNaN(lon)) {
            let cor;
            if (categoria == "1") cor = "blue";     // Pequeno
            else if (categoria == "2") cor = "orange"; // Médio
            else if (categoria == "3") cor = "purple"; // Grande
            else cor = "gray"; // fallback

            L.circleMarker([lat, lon], {
              radius: 6,
              color: cor,
              fillOpacity: 0.7
            }).addTo(map)
              .bindPopup(`Buraco categoria ${categoria}<br>Lat: ${lat}<br>Lon: ${lon}`);
          }
        });
      });
  </script>
</body>
</html>
