<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Mapa de Buracos - São Carlos-SP</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <style>
    #map { height: 600px; width: 100%; }
    body { font-family: Arial, sans-serif; margin: 0; padding: 0; }
    h1 { text-align: center; margin: 10px; }
  </style>
</head>
<body>
  <h1>Monitoramento de Buracos - São Carlos-SP</h1>
  <div id="map"></div>

  <!-- Bibliotecas -->
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://unpkg.com/papaparse@5.3.2/papaparse.min.js"></script>

  <script>
    // Inicializar mapa centrado em São Carlos-SP
    const map = L.map('map').setView([-22.0056, -47.8977], 13);

    // Camada base OpenStreetMap
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors'
    }).addTo(map);

    // Link RAW correto do CSV no GitHub
    const csvUrl = "https://raw.githubusercontent.com/projetointegradorsaocarlosv/mapa-buracos/main/dados.csv";

    // Ler CSV com PapaParse
    Papa.parse(csvUrl, {
      download: true,
      header: true,
      complete: function(results) {
        results.data.forEach(row => {
          const lat = Number((row.field2 || "").trim());
          const lon = Number((row.field3 || "").trim());
          const categoria = row.field4;

          if (!isNaN(lat) && !isNaN(lon)) {
            let cor;
            if (categoria == "1") cor = "blue";     // Pequeno
            else if (categoria == "2") cor = "orange"; // Médio
            else if (categoria == "3") cor = "purple"; // Grande
            else cor = "gray"; // fallback

            L.circleMarker([lat, lon], {
              radius: 6,
              color: cor,
              fillOpacity: 0.7
            }).addTo(map)
              .bindPopup(`Buraco categoria ${categoria}<br>Lat: ${lat}<br>Lon: ${lon}`);
          }
        });
      }
    });
  </script>
</body>
</html>
